name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Configure git identity (required for git commit tests)
        run: |
          git config --global user.email "ci@hermes-test.local"
          git config --global user.name "Hermes CI"

      - name: Lint
        run: ruff check scripts/ tests/

      - name: Test
        run: pytest tests/ -v
